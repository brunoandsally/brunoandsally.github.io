<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bruno & Sally — The Board</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<script>
// Redirect to shell if loaded directly (not in iframe)
(function(){
  if(window.self === window.top){
    var page = window.location.pathname.replace(/^\//, '').split('/')[0];
    window.location.replace('/' + (page ? '#' + page : ''));
  }
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#5C7A5C;--sage-light:#8FA882;--sage-pale:#EEF2E8;
  --sky:#4A7FA8;--sky-light:#7BAFD4;
  --cream:#FAF8F3;--stone:#F0EBE1;
  --ink:#2C2C2A;--ink-soft:#5C5A56;
  --warm:#C4894A;--warm-light:#E8C49A;
  --white:#fff;--line:rgba(44,44,42,0.12);
}
html{scroll-behavior:smooth}
body{font-family:"Jost",sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;min-height:100vh}

/* ── HERO ── */
.hero{background:var(--ink);color:#fff;padding:3rem 2rem 2.5rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'💒 🥂 🌊 🦞 ☀️ 💐 🎉 🕺';position:absolute;top:0.5rem;left:0;right:0;font-size:1.4rem;opacity:0.12;letter-spacing:0.5rem;white-space:nowrap;overflow:hidden}
.hero .eyebrow{font-size:0.68rem;font-weight:600;letter-spacing:0.28em;text-transform:uppercase;color:var(--warm-light);margin-bottom:0.7rem}
.hero h1{font-family:"Cormorant Garamond",serif;font-size:clamp(2rem,5vw,3rem);font-weight:300;line-height:1;margin-bottom:0.4rem}
.hero p{color:rgba(255,255,255,0.5);font-size:0.88rem;max-width:40ch;margin:0 auto}

/* ── TABS ── */
.tabs{display:flex;justify-content:center;background:var(--stone);border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:10}
.tab-btn{padding:0.9rem 1.4rem;background:none;border:none;border-bottom:2px solid transparent;font-family:"Jost",sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);cursor:pointer;white-space:nowrap;transition:all 0.2s}
.tab-btn:hover{color:var(--ink)}
.tab-btn.active{color:var(--sage);border-bottom-color:var(--sage)}
.panel{display:none;padding:2rem 1.2rem;max-width:680px;margin:0 auto}
.panel.active{display:block}

/* ── POLLS ── */
.poll-grid{display:flex;flex-direction:column;gap:1.2rem}
.poll-card{background:#fff;border:1px solid var(--line);border-radius:6px;padding:1.4rem;transition:box-shadow 0.2s}
.poll-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.poll-pin{font-size:0.62rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--warm);margin-bottom:0.5rem}
.poll-q{font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:400;margin-bottom:0.9rem;line-height:1.3}
.poll-opts{display:flex;flex-direction:column;gap:0.4rem}
.poll-opt{position:relative;border:1.5px solid var(--line);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.1s;background:#fff;-webkit-tap-highlight-color:transparent}
.poll-opt:hover:not(.voted){border-color:var(--sage-light);transform:translateX(2px)}
.poll-opt.voted{border-color:var(--sage);cursor:default}
.poll-opt .bar{position:absolute;inset:0;background:var(--sage-pale);transition:width 0.5s cubic-bezier(.4,0,.2,1)}
.poll-opt .label{position:relative;padding:0.55rem 0.85rem;font-size:0.86rem;display:flex;justify-content:space-between;align-items:center;gap:0.5rem;z-index:1}
.poll-opt .pct{font-weight:700;font-size:0.78rem;color:var(--sage);min-width:2.5rem;text-align:right}
.poll-total{font-size:0.72rem;color:var(--ink-soft);margin-top:0.5rem}
.voted-tick{color:var(--sage);font-weight:700;margin-left:0.3rem}

/* ── MESSAGE BOARD ── */
/* Compose box */
.compose-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:1.2rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.compose-top{display:flex;gap:0.7rem;align-items:center;margin-bottom:0.8rem}
.avatar-preview{width:40px;height:40px;border-radius:50%;background:var(--sage-pale);border:2px solid var(--sage-light);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;transition:all 0.2s}
.name-input{flex:1;font-family:"Jost",sans-serif;font-size:0.9rem;border:1.5px solid var(--line);border-radius:4px;padding:0.55rem 0.75rem;background:#fff;color:var(--ink);transition:border-color 0.15s}
.name-input:focus{outline:none;border-color:var(--sage-light)}

/* ── EMOJI PANEL ── */
.emoji-panel-toggle{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem}
.emoji-panel-btn{display:flex;align-items:center;gap:0.4rem;padding:0.35rem 0.75rem;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;font-size:0.78rem;color:var(--ink-soft);transition:all 0.15s;font-family:"Jost",sans-serif;-webkit-tap-highlight-color:transparent}
.emoji-panel-btn:hover{border-color:var(--sage-light);background:var(--sage-pale)}
.emoji-panel{display:none;background:var(--stone);border-radius:10px;padding:0.8rem;margin-bottom:0.7rem;animation:fadeUp 0.15s ease}
.emoji-panel.open{display:block}
.emoji-panel-cats{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.6rem;border-bottom:1px solid var(--line);padding-bottom:0.5rem}
.emoji-cat-btn{padding:0.25rem 0.6rem;border-radius:20px;border:1px solid transparent;background:none;cursor:pointer;font-size:0.72rem;font-weight:600;color:var(--ink-soft);font-family:"Jost",sans-serif;transition:all 0.12s;letter-spacing:0.05em;text-transform:uppercase}
.emoji-cat-btn:hover,.emoji-cat-btn.active{background:var(--sage-pale);border-color:var(--sage-light);color:var(--sage)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:0.25rem}
.ep{width:36px;height:36px;border:1.5px solid transparent;border-radius:7px;background:#fff;cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;transition:all 0.1s;-webkit-tap-highlight-color:transparent}
.ep:hover{border-color:var(--sage-light);transform:scale(1.12);background:var(--sage-pale)}
.ep.avatar-sel{border-color:var(--sage);background:var(--sage-pale)}
.emoji-panel-hint{font-size:0.7rem;color:var(--ink-soft);margin-top:0.5rem;font-style:italic}

/* Message textarea */
.msg-area-wrap{position:relative}
.msg-area{width:100%;font-family:"Jost",sans-serif;font-size:0.92rem;border:1.5px solid var(--line);border-radius:6px;padding:0.7rem 0.85rem;background:#fff;color:var(--ink);resize:none;transition:border-color 0.15s;line-height:1.5;min-height:72px}
.msg-area:focus{outline:none;border-color:var(--sage-light)}
.char-count{position:absolute;bottom:6px;right:8px;font-size:0.68rem;color:var(--ink-soft);opacity:0.6}
.post-btn{width:100%;margin-top:0.7rem;padding:0.75rem;border-radius:4px;border:none;background:var(--sage);color:#fff;font-family:"Jost",sans-serif;font-size:0.78rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem}
.post-btn:hover{background:var(--sage-light)}
.post-btn:disabled{background:var(--line);color:var(--ink-soft);cursor:default}
.status-msg{padding:0.6rem 0.9rem;border-radius:4px;font-size:0.83rem;margin-top:0.6rem;display:none}
.status-msg.show{display:block}
.status-msg.ok{background:var(--sage-pale);color:var(--sage);border:1px solid var(--sage-light)}
.status-msg.err{background:#fdf0e8;color:#a85a20;border:1px solid var(--warm-light)}

/* Posts feed */
.feed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.feed-header h3{font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:400}
.feed-count{font-size:0.72rem;color:var(--ink-soft);background:var(--stone);padding:0.2rem 0.6rem;border-radius:20px}
.posts-list{display:flex;flex-direction:column;gap:0.8rem}

/* Post card */
.post-card{display:flex;gap:0.75rem;align-items:flex-start;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.post-avatar{width:40px;height:40px;border-radius:50%;background:var(--sage-pale);border:2px solid var(--sage-light);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.post-bubble{background:#fff;border:1px solid var(--line);border-radius:0 10px 10px 10px;padding:0.75rem 0.9rem;flex:1;min-width:0;position:relative}
.post-bubble::before{content:'';position:absolute;left:-8px;top:12px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:8px solid var(--line)}
.post-bubble::after{content:'';position:absolute;left:-6px;top:13px;width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-right:7px solid #fff}
.post-meta{display:flex;gap:0.5rem;align-items:baseline;margin-bottom:0.2rem;flex-wrap:wrap}
.post-name{font-weight:600;font-size:0.84rem}
.post-time{font-size:0.68rem;color:var(--ink-soft)}
.post-text{font-size:0.9rem;line-height:1.5;word-break:break-word}

/* Reactions + reply bar */
.post-actions{display:flex;align-items:center;gap:0.4rem;margin-top:0.55rem;flex-wrap:wrap}
.react-btn{border:1px solid var(--line);border-radius:20px;padding:0.18rem 0.5rem;font-size:0.82rem;cursor:pointer;background:#fff;color:var(--ink);transition:all 0.12s;display:flex;align-items:center;gap:0.2rem;-webkit-tap-highlight-color:transparent}
.react-btn:hover{border-color:var(--warm-light);background:var(--stone)}
.react-btn.reacted{background:var(--warm-light);border-color:var(--warm);font-weight:600}
.react-count{font-size:0.73rem;font-weight:600}
.add-react-btn{border:1px dashed var(--line);border-radius:20px;padding:0.18rem 0.5rem;font-size:0.82rem;cursor:pointer;background:transparent;color:var(--ink-soft);transition:all 0.12s;-webkit-tap-highlight-color:transparent}
.add-react-btn:hover{border-color:var(--sage-light);color:var(--sage);background:var(--sage-pale)}
.reply-btn{border:none;background:none;font-size:0.72rem;color:var(--ink-soft);cursor:pointer;padding:0.18rem 0.3rem;font-family:"Jost",sans-serif;letter-spacing:0.06em;transition:color 0.12s;-webkit-tap-highlight-color:transparent}
.reply-btn:hover{color:var(--sage)}

/* Reaction picker popup */
.react-picker{display:none;position:absolute;bottom:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--line);border-radius:10px;padding:0.5rem;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:200;flex-wrap:wrap;gap:0.2rem;width:260px}
.react-picker.open{display:flex}
.react-picker .ep{width:32px;height:32px;font-size:1rem}

/* Threads */
.thread{margin-top:0.7rem;border-left:2px solid var(--sage-pale);padding-left:0.8rem;display:flex;flex-direction:column;gap:0.5rem}
.reply-card{display:flex;gap:0.5rem;align-items:flex-start}
.reply-avatar{width:30px;height:30px;border-radius:50%;background:var(--stone);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.reply-bubble{background:var(--stone);border-radius:0 8px 8px 8px;padding:0.5rem 0.7rem;flex:1;min-width:0}
.reply-name{font-weight:600;font-size:0.78rem;margin-right:0.3rem}
.reply-time{font-size:0.66rem;color:var(--ink-soft)}
.reply-text{font-size:0.86rem;line-height:1.4;word-break:break-word;margin-top:0.15rem}
.reply-compose{display:none;margin-top:0.5rem;gap:0.4rem;align-items:flex-end}
.reply-compose.open{display:flex}
.reply-input{flex:1;font-family:"Jost",sans-serif;font-size:0.86rem;border:1.5px solid var(--line);border-radius:6px;padding:0.45rem 0.65rem;background:#fff;color:var(--ink);resize:none;min-height:48px;transition:border-color 0.15s}
.reply-input:focus{outline:none;border-color:var(--sage-light)}
.reply-send{padding:0.45rem 0.9rem;border:none;border-radius:4px;background:var(--sage);color:#fff;font-family:"Jost",sans-serif;font-size:0.72rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background 0.15s}
.reply-send:hover{background:var(--sage-light)}

.loading{text-align:center;padding:2.5rem;color:var(--ink-soft);font-size:0.88rem;font-style:italic}
.empty{text-align:center;padding:3rem 1rem;color:var(--ink-soft)}
.empty .empty-icon{font-size:2.5rem;margin-bottom:0.5rem}
.empty p{font-size:0.9rem}

/* ── FOOTER ── */
footer{text-align:center;padding:2rem 1rem;font-size:0.78rem;color:var(--ink-soft);border-top:1px solid var(--line);margin-top:2rem}
.fn{font-family:"Cormorant Garamond",serif;font-size:0.95rem;color:var(--ink);margin-bottom:0.2rem}
@media(max-width:480px){
  .panel{padding:1.2rem 0.8rem}
  .post-bubble{border-radius:0 8px 8px 8px}
}
</style>
</head>
<body>

<div class="hero">
  <p class="eyebrow">Bruno &amp; Sally · 18 September 2027</p>
  <h1>The Board 💬</h1>
  <p>Cast your predictions. Leave a message. Join the chaos.</p>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('predictions',this)">🔮 Predictions</button>
  <button class="tab-btn" onclick="switchTab('messages',this)">💌 Messages</button>
</div>

<!-- ══ PREDICTIONS ══ -->
<div class="panel active" id="panel-predictions">
  <p style="color:var(--ink-soft);font-size:0.85rem;margin-bottom:1.2rem">Tap to vote. Results update live.</p>
  <div class="poll-grid" id="poll-grid">
    <div class="loading">Loading predictions…</div>
  </div>
</div>

<!-- ══ MESSAGES ══ -->
<div class="panel" id="panel-messages">

  <div class="compose-card">
    <div class="compose-top">
      <div class="avatar-preview" id="avatar-preview">😊</div>
      <input type="text" class="name-input" id="msg-name" placeholder="Your name" maxlength="40"/>
    </div>

    <div style="margin-bottom:0.7rem">
      <button class="emoji-panel-btn" onclick="toggleEmojiDrawer()" id="emoji-toggle-btn" style="display:flex;align-items:center;gap:0.4rem;padding:0.35rem 0.75rem;border:1.5px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;font-size:0.78rem;color:var(--ink-soft);font-family:'Jost',sans-serif">
        <span id="emoji-current">😊</span><span>Emoji</span><span id="emoji-chevron">▾</span>
      </button>
    </div>
    <div id="emoji-drawer" style="display:none;flex-wrap:wrap;gap:0.25rem;padding:0.7rem;background:var(--stone);border-radius:8px;margin-bottom:0.7rem"></div>

    <div class="msg-area-wrap">
      <textarea class="msg-area" id="msg-text" placeholder="Say something lovely (or funny)…" maxlength="300" oninput="updateCharCount()"></textarea>
      <span class="char-count" id="char-count">300</span>
    </div>

    <button class="post-btn" id="post-btn" onclick="submitPost()">
      <span>Send message</span><span id="post-emoji">😊</span>
    </button>
    <div class="status-msg" id="msg-status"></div>
  </div>

  <div class="feed-header">
    <h3>Messages</h3>
    <span class="feed-count" id="feed-count">loading…</span>
  </div>
  <div class="posts-list" id="posts-list">
    <div class="loading">Loading messages…</div>
  </div>
</div>

<footer>
  <p class="fn">Bruno &amp; Sally</p>
  <p>18 September 2027 · Holy Cross Church, Newton Ferrers</p>
</footer>

<script>
var SUPA_URL = 'https://zjynlhguilaoxrioysxn.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqeW5saGd1aWxhb3hyaW95c3huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTMxMTksImV4cCI6MjA5NzcyOTExOX0.jwjX0wyaGnsns8Gy8q1XF-B7QIIAVKFtrMfl4SAZ1L0';
var supa = supabase.createClient(SUPA_URL, SUPA_KEY);

var VOTER_ID = localStorage.getItem('voter_id') || (function(){
  var id = Math.random().toString(36).slice(2)+Date.now().toString(36);
  localStorage.setItem('voter_id', id); return id;
})();

// ── TAB SWITCHING ──────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('panel-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

// ── EMOJI ──────────────────────────────────────────────────
var selectedEmoji = '😊';
var EMOJIS = ['😊','😂','🥂','💒','💐','🌊','🎉','❤️','🦞','🥳','😭','🕺','🎊','🌸','🍊','👏','🤩','😎','💍','🎀','⛵','🦀','🥃','🍾','🥰'];

(function(){
  var drawer = document.getElementById('emoji-drawer');
  if(!drawer) return;
  EMOJIS.forEach(function(e){
    var btn = document.createElement('button');
    btn.className = 'ep' + (e===selectedEmoji?' avatar-sel':'');
    btn.textContent = e;
    btn.onclick = function(){
      selectedEmoji = e;
      var av = document.getElementById('avatar-preview');
      var pe = document.getElementById('post-emoji');
      var ec = document.getElementById('emoji-current');
      if(av) av.textContent = e;
      if(pe) pe.textContent = e;
      if(ec) ec.textContent = e;
      drawer.querySelectorAll('.ep').forEach(function(b){ b.classList.remove('avatar-sel'); });
      btn.classList.add('avatar-sel');
      // Insert into textarea too
      var ta = document.getElementById('msg-text');
      if(ta){ var s=ta.selectionStart||0; ta.value=ta.value.slice(0,s)+e+ta.value.slice(s); updateCharCount(); }
      toggleEmojiDrawer(false);
    };
    drawer.appendChild(btn);
  });
})();

function toggleEmojiDrawer(forceClose){
  var drawer = document.getElementById('emoji-drawer');
  var chevron = document.getElementById('emoji-chevron');
  if(!drawer) return;
  var isOpen = drawer.classList.contains('open');
  var shouldOpen = forceClose===false ? false : !isOpen;
  drawer.classList.toggle('open', shouldOpen);
  if(chevron) chevron.textContent = shouldOpen ? '▴' : '▾';
}

function updateCharCount(){
  var v = document.getElementById('msg-text');
  var el = document.getElementById('char-count');
  if(!v||!el) return;
  var rem = 300 - v.value.length;
  el.textContent = rem;
  el.style.color = rem < 30 ? '#b83232' : '';
}

// ── POSTS ──────────────────────────────────────────────────
var postsCache = [];

function timeAgo(iso){
  var diff = (Date.now() - new Date(iso)) / 1000;
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60)+'m ago';
  if(diff < 86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

function loadPosts(){
  supa.from('posts').select('*').order('created_at',{ascending:false}).limit(100)
    .then(function(res){
      if(res.error){ showPostsError(res.error.message); return; }
      postsCache = (res.data||[]).filter(function(p){ return !p.reply_to; });
      renderPosts();
    }).catch(function(e){ showPostsError(e&&e.message?e.message:'Network error'); });
}

function showPostsError(msg){
  var el = document.getElementById('posts-list');
  if(el) el.innerHTML = '<div class="empty"><div class="empty-icon">😬</div><p>'+escHtml(msg)+'</p></div>';
}

function renderPosts(){
  var list = document.getElementById('posts-list');
  var count = document.getElementById('feed-count');
  if(count) count.textContent = postsCache.length + (postsCache.length===1?' message':' messages');
  if(!postsCache.length){
    list.innerHTML = '<div class="empty"><div class="empty-icon">💌</div><p>No messages yet — be the first!</p></div>';
    return;
  }
  list.innerHTML = '';
  postsCache.forEach(function(p){
    var card = document.createElement('div');
    card.className = 'post-card';
    card.id = 'post-'+p.id;

    var av = document.createElement('div');
    av.className = 'post-avatar';
    av.textContent = p.emoji || '😊';
    card.appendChild(av);

    var bubble = document.createElement('div');
    bubble.className = 'post-bubble';

    var meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.innerHTML = '<span class="post-name">'+escHtml(p.name)+'</span><span class="post-time">'+timeAgo(p.created_at)+'</span>';
    bubble.appendChild(meta);

    var txt = document.createElement('div');
    txt.className = 'post-text';
    txt.textContent = p.message;
    bubble.appendChild(txt);

    // Reactions
    var reactions = p.reactions || {};
    var reacted = JSON.parse(localStorage.getItem('reacted_'+p.id)||'{}');
    var reactDiv = document.createElement('div');
    reactDiv.className = 'reactions';
    var REACT_EMOJIS = ['❤️','😂','🥂','👏'];
    REACT_EMOJIS.forEach(function(r){
      var cnt = reactions[r]||0;
      var btn = document.createElement('button');
      btn.className = 'react-btn' + (reacted[r]?' reacted':'');
      btn.innerHTML = r + (cnt>0?'<span class="react-count">'+cnt+'</span>':'');
      (function(postId,reaction){ btn.onclick = function(){ reactPost(postId,reaction); }; })(p.id, r);
      reactDiv.appendChild(btn);
    });
    bubble.appendChild(reactDiv);
    card.appendChild(bubble);
    list.appendChild(card);
  });
}

function submitPost(){
  var name = document.getElementById('msg-name').value.trim();
  var message = document.getElementById('msg-text').value.trim();
  var status = document.getElementById('msg-status');
  var btn = document.getElementById('post-btn');
  if(!name){ showStatus(status,'Enter your name first 👆','err'); return; }
  if(!message){ showStatus(status,'Write something first!','err'); return; }
  btn.disabled = true;
  supa.from('posts').insert({name:name, message:message, emoji:selectedEmoji, reactions:{}})
    .then(function(res){
      if(res.error){ showStatus(status,'Error: '+res.error.message,'err'); btn.disabled=false; return; }
      document.getElementById('msg-text').value = '';
      document.getElementById('char-count').textContent = '300';
      showStatus(status,'Posted! 🎉','ok');
      loadPosts();
      btn.disabled = false;
    }).catch(function(e){
      showStatus(status,'Failed: '+(e&&e.message?e.message:e),'err');
      btn.disabled = false;
    });
}

function reactPost(postId, reaction){
  var reacted = JSON.parse(localStorage.getItem('reacted_'+postId)||'{}');
  if(reacted[reaction]) return;
  supa.from('posts').select('reactions').eq('id',postId).single()
    .then(function(res){
      var reactions = (res.data&&res.data.reactions)||{};
      reactions[reaction] = (reactions[reaction]||0)+1;
      return supa.from('posts').update({reactions:reactions}).eq('id',postId);
    }).then(function(){
      reacted[reaction]=true;
      localStorage.setItem('reacted_'+postId, JSON.stringify(reacted));
      loadPosts();
    }).catch(function(e){ console.warn('react failed',e); });
}

// ── POLLS ──────────────────────────────────────────────────
var pollsCache = [];
var myVotes = JSON.parse(localStorage.getItem('my_votes')||'{}');

var SEED_POLLS = [
  {question:'Who cries first?', options:['Bruno','Sally','Father of the bride','An unexpected guest']},
  {question:'What time does Bruno fall asleep at the after-party?', options:['Before midnight','12–1am','1–2am','Still going at 3am']},
  {question:'Weather on the day?', options:['Full Devon sunshine ☀️','Light drizzle 🌦️','Full monsoon 🌧️','All three in one day']},
  {question:'How many Aperol Spritzes get consumed?', options:['Under 50','50–100','100–200','Lost count after 100']},
  {question:'Will the hog roast run out?', options:['Yes — chaos ensues','No — plenty for all','There are leftovers','What hog roast?']},
  {question:'Who gives the most chaotic speech?', options:['Groomsman Jamie','Father of the bride','Bruno','Sally']},
  {question:"What is Bruno's first dance move?", options:['Dignified and smooth','Enthusiastic but risky','Full dad-dance energy','Refuses to move at all']},
  {question:'Does anyone get lost on the way to Newton Ferrers?', options:['At least 3 cars','Just one — and they know who','Nobody — Google Maps saves the day','Everyone arrives somehow']},
];

function loadPolls(){
  var grid = document.getElementById('poll-grid');
  grid.innerHTML = '<div class="loading">Loading predictions…</div>';
  supa.from('polls').select('*').order('created_at',{ascending:true})
    .then(function(res){
      if(res.error){ grid.innerHTML='<div class="empty"><p>Error: '+escHtml(res.error.message)+'</p></div>'; return; }
      var data = res.data||[];
      if(data.length===0){
        return supa.from('polls').insert(SEED_POLLS.map(function(p){
          return {question:p.question, options:p.options.map(function(o){ return {text:o,votes:0}; })};
        })).then(function(){ return supa.from('polls').select('*').order('created_at',{ascending:true}); })
          .then(function(res2){ pollsCache=res2.data||[]; renderPolls(); });
      }
      pollsCache = data;
      renderPolls();
    }).catch(function(e){
      grid.innerHTML='<div class="empty"><p>Failed to load: '+escHtml(e&&e.message?e.message:String(e))+'</p></div>';
    });
}

function renderPolls(){
  var grid = document.getElementById('poll-grid');
  if(!pollsCache.length){ grid.innerHTML='<div class="empty"><p>No predictions yet.</p></div>'; return; }
  grid.innerHTML = '';
  pollsCache.forEach(function(poll, pi){
    var opts = poll.options||[];
    var total = opts.reduce(function(s,o){ return s+(o.votes||0); },0);
    var voted = myVotes[poll.id];

    var card = document.createElement('div');
    card.className = 'poll-card';

    if(pi<3){
      var pin = document.createElement('div');
      pin.className = 'poll-pin';
      pin.textContent = '📌 Featured prediction';
      card.appendChild(pin);
    }

    var q = document.createElement('div');
    q.className = 'poll-q';
    q.textContent = poll.question;
    card.appendChild(q);

    var optsDiv = document.createElement('div');
    optsDiv.className = 'poll-opts';

    opts.forEach(function(opt, oi){
      var pct = total>0 ? Math.round((opt.votes||0)/total*100) : 0;
      var isSel = voted===oi;

      var optEl = document.createElement('div');
      optEl.className = 'poll-opt' + (isSel?' voted':'');

      var bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.width = (voted!==undefined?pct:0)+'%';
      optEl.appendChild(bar);

      var label = document.createElement('div');
      label.className = 'label';
      label.innerHTML = '<span>'+escHtml(opt.text)+(isSel?' ✓':'')+'</span>'+(voted!==undefined?'<span class="pct">'+pct+'%</span>':'');
      optEl.appendChild(label);

      if(voted===undefined){
        (function(pollId, optIdx){ optEl.onclick = function(){ castVote(pollId, optIdx); }; })(poll.id, oi);
      }
      optsDiv.appendChild(optEl);
    });
    card.appendChild(optsDiv);

    if(voted!==undefined){
      var tot = document.createElement('div');
      tot.className = 'poll-total';
      tot.textContent = total+' vote'+(total!==1?'s':'');
      card.appendChild(tot);
    } else {
      var tap = document.createElement('div');
      tap.className = 'poll-total';
      tap.style.fontStyle = 'italic';
      tap.textContent = 'Tap to vote';
      card.appendChild(tap);
    }
    grid.appendChild(card);
  });
}

function castVote(pollId, optionIdx){
  if(myVotes[pollId]!==undefined) return;
  myVotes[pollId] = optionIdx;
  localStorage.setItem('my_votes', JSON.stringify(myVotes));
  var cached = pollsCache.find(function(p){ return p.id===pollId; });
  if(cached){ cached.options[optionIdx].votes=(cached.options[optionIdx].votes||0)+1; renderPolls(); }
  supa.from('polls').select('options').eq('id',pollId).single()
    .then(function(res){
      var opts = JSON.parse(JSON.stringify(res.data.options));
      opts[optionIdx].votes=(opts[optionIdx].votes||0)+1;
      return supa.from('polls').update({options:opts}).eq('id',pollId);
    }).then(function(){
      if(cached) renderPolls();
    }).catch(function(e){
      delete myVotes[pollId];
      localStorage.setItem('my_votes',JSON.stringify(myVotes));
      if(cached){ cached.options[optionIdx].votes=Math.max(0,(cached.options[optionIdx].votes||1)-1); renderPolls(); }
    });
}

// ── UTILS ──────────────────────────────────────────────────
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showStatus(el, msg, type){
  if(!el) return;
  el.textContent = msg;
  el.className = 'status-msg show '+type;
  setTimeout(function(){ el.className='status-msg'; }, 4000);
}

// ── REALTIME ───────────────────────────────────────────────
supa.channel('public:posts').on('postgres_changes',
  {event:'INSERT', schema:'public', table:'posts'},
  function(payload){
    if(postsCache.find(function(p){ return p.id===payload.new.id; })) return;
    if(!payload.new.reply_to) postsCache.unshift(payload.new);
    if(document.getElementById('panel-messages').classList.contains('active')) renderPosts();
  }
).subscribe();

// ── INIT ───────────────────────────────────────────────────
loadPolls();
loadPosts();

</script>

<script>
(function(){
  var VALID=['home','the-day','our-story','rsvp','faq','wedding-party','day-after','games','community'];
  function shellNav(page){
    if(window.parent!==window){ window.parent.postMessage({nav:page},'*'); }
    else { window.location.href='/'+page; }
  }
  window.shellNav=shellNav;
  document.addEventListener('click',function(e){
    var a=e.target.closest('a[href]');
    if(!a) return;
    var href=a.getAttribute('href')||'';
    if(!href.startsWith('/')||href.startsWith('//')) return;
    var page=href.replace(/^\//,'').split('/')[0];
    if(VALID.indexOf(page)>=0){ e.preventDefault(); e.stopImmediatePropagation(); shellNav(page); }
  },true);
})();
</script>
