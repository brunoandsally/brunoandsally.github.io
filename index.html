<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bruno & Sally — 18th September 2027</title>
<meta name="description" content="Bruno & Sally are getting married in Devon, 18th September 2027."/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#5C7A5C;--sage-light:#8FA882;
  --cream:#FAF8F3;--stone:#F0EBE1;
  --ink:#2C2C2A;--ink-soft:#5C5A56;
  --warm:#C4894A;--warm-light:#E8C49A;
  --line:rgba(44,44,42,0.1);
}
html,body{height:100%;overflow:hidden;font-family:"Jost",sans-serif}
body{display:flex;flex-direction:column;background:var(--cream)}

/* NAV */
#nav{
  flex-shrink:0;
  background:rgba(250,248,243,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 var(--line);
  z-index:100;
}
.nav-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.8rem;height:64px;
}
.nav-brand{
  font-family:"Cormorant Garamond",serif;font-size:1.35rem;font-weight:400;
  color:var(--ink);text-decoration:none;letter-spacing:0.04em;flex-shrink:0;
}
.nav-brand span{color:var(--sage);font-style:italic}
.nav-links{display:flex;gap:0;list-style:none;align-items:center}
.nav-links a{
  display:block;padding:0 0.85rem;
  font-size:0.68rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--ink-soft);text-decoration:none;
  transition:color 0.2s;position:relative;white-space:nowrap;cursor:pointer;
}
.nav-links a::after{
  content:"";position:absolute;bottom:-1px;left:0.85rem;right:0.85rem;
  height:2px;background:var(--sage);transform:scaleX(0);transition:transform 0.25s;
}
.nav-links a:hover{color:var(--ink)}
.nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1)}
.nav-links a.active{color:var(--ink)}
.nav-links a.games-link{color:var(--warm)}
.nav-burger{
  display:none;background:none;border:none;cursor:pointer;
  padding:0.5rem;color:var(--ink);font-size:1.3rem;
}
.nav-drawer{
  display:none;position:fixed;inset:0 0 0 25%;
  background:var(--ink);flex-direction:column;
  padding:5rem 2rem;gap:0;z-index:200;
  transform:translateX(100%);transition:transform 0.3s;
}
.nav-drawer.open{transform:translateX(0)}
.nav-drawer a{
  display:block;padding:1rem 0;
  font-size:0.82rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(255,255,255,0.8);text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer;
}
.nav-drawer a:hover{color:#fff}

/* IFRAME */
#content-frame{
  flex:1;border:none;width:100%;
  transition:opacity 0.2s;
}
#content-frame.loading{opacity:0.5}

/* SPOTIFY */
#spotify-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:#0a0a0a;
  transform:translateY(100%);
  transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
#spotify-bar.open{transform:translateY(0)}
#spotify-bar iframe{width:100%;height:80px;border:none;display:block}
#spotify-toggle{
  position:fixed;bottom:1.2rem;right:1.2rem;z-index:301;
  width:50px;height:50px;border-radius:50%;
  background:#1DB954;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(29,185,84,0.45);
  transition:transform 0.2s,box-shadow 0.2s,bottom 0.4s cubic-bezier(0.4,0,0.2,1);
}
#spotify-toggle:hover{transform:scale(1.08)}
#spotify-toggle.bar-open{bottom:92px}
#spotify-toggle svg{width:24px;height:24px;fill:white}

/* LOADING INDICATOR */
#page-loader{
  position:fixed;top:64px;left:0;right:0;height:2px;
  background:var(--sage);transform:scaleX(0);transform-origin:left;
  transition:transform 0.3s,opacity 0.3s;z-index:200;
}
#page-loader.loading{transform:scaleX(0.7)}
#page-loader.done{transform:scaleX(1);opacity:0}

@media(max-width:900px){
  .nav-links{display:none}
  .nav-drawer{display:flex}
  .nav-burger{display:block}
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="nav-inner">
    <a class="nav-brand" onclick="nav('home');return false" href="/home">Bruno <span>&amp;</span> Sally</a>
    <ul class="nav-links" id="desktopNav">
      <li><a onclick="nav('home');return false" href="/home" data-page="home">Home</a></li>
      <li><a onclick="nav('the-day');return false" href="/the-day" data-page="the-day">The Day</a></li>
      <li><a onclick="nav('our-story');return false" href="/our-story" data-page="our-story">Our Story</a></li>
      <li><a onclick="nav('rsvp');return false" href="/rsvp" data-page="rsvp">RSVP</a></li>
      <li><a onclick="nav('faq');return false" href="/faq" data-page="faq">FAQ</a></li>
      <li><a onclick="nav('wedding-party');return false" href="/wedding-party" data-page="wedding-party">Wedding Party</a></li>
      <li><a onclick="nav('day-after');return false" href="/day-after" data-page="day-after">Sunday 19th</a></li>
      <li><a onclick="nav('games');return false" href="/games" data-page="games" class="games-link">Games 🎮</a></li>
    </ul>
    <button class="nav-burger" onclick="toggleDrawer()" aria-label="Menu">&#9776;</button>
  </div>
</nav>

<!-- MOBILE DRAWER -->
<nav class="nav-drawer" id="drawer">
  <a onclick="nav('home');closeDrawer();return false" href="/home">Home</a>
  <a onclick="nav('the-day');closeDrawer();return false" href="/the-day">The Day</a>
  <a onclick="nav('our-story');closeDrawer();return false" href="/our-story">Our Story</a>
  <a onclick="nav('rsvp');closeDrawer();return false" href="/rsvp">RSVP</a>
  <a onclick="nav('faq');closeDrawer();return false" href="/faq">FAQ</a>
  <a onclick="nav('wedding-party');closeDrawer();return false" href="/wedding-party">Wedding Party</a>
  <a onclick="nav('day-after');closeDrawer();return false" href="/day-after">Sunday 19th</a>
  <a onclick="nav('games');closeDrawer();return false" href="/games" style="color:var(--warm-light)">Games 🎮</a>
</nav>

<!-- PAGE LOADER BAR -->
<div id="page-loader"></div>

<!-- CONTENT IFRAME -->
<iframe id="content-frame" src="/home" title="Content"></iframe>

<!-- SPOTIFY -->
<div id="spotify-bar">
  <iframe src="https://open.spotify.com/embed/playlist/4tHQlLOP1GLsuQMilIUehP?utm_source=generator&theme=0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="lazy"></iframe>
</div>
<button id="spotify-toggle" onclick="toggleSpotify()" aria-label="Toggle music" title="WeddingJamz playlist">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
  </svg>
</button>

<script>
var spOpen = false;
var currentPage = '';
var VALID = ['home','the-day','our-story','rsvp','faq','wedding-party','day-after','games'];
var frame = document.getElementById('content-frame');

// ── Navigation ──────────────────────────────────────────────
function nav(page, pushState) {
  if (!page || VALID.indexOf(page) < 0) page = 'home';
  currentPage = page;

  // Update URL bar
  if (pushState !== false) {
    history.pushState({page: page}, '', '/' + page);
  }

  // Update active highlights
  setActive(page);

  // Progress bar
  var loader = document.getElementById('page-loader');
  loader.className = 'loading';

  // Load page into iframe — onload replaces itself each time (no stacking)
  frame.classList.add('loading');
  frame.onload = function() {
    frame.classList.remove('loading');
    loader.className = 'done';
    setTimeout(function() { loader.className = ''; }, 400);
    try { frame.contentWindow.scrollTo(0, 0); } catch(e) {}
  };
  frame.src = '/' + page;
}

function setActive(page) {
  document.querySelectorAll('[data-page]').forEach(function(a) {
    a.classList.toggle('active', a.dataset.page === page);
  });
}

// ── Messages from inside the iframe ─────────────────────────
// Content pages post: window.parent.postMessage({nav:'page-name'}, '*')
window.addEventListener('message', function(e) {
  if (e.data && e.data.nav && VALID.indexOf(e.data.nav) >= 0) {
    nav(e.data.nav);
  }
});

// ── Browser back / forward ──────────────────────────────────
window.addEventListener('popstate', function(e) {
  var page = (e.state && e.state.page) ? e.state.page : 'home';
  nav(page, false);
});

// ── Detect initial page from URL or hash (set by redirect) ──
function getInitialPage() {
  // Check hash first — set by content pages when loaded directly
  var hash = window.location.hash.replace(/^#/, '');
  if (hash && VALID.indexOf(hash) >= 0) {
    // Clean the hash from the URL
    history.replaceState({page: hash}, '', '/' + hash);
    return hash;
  }
  var path = window.location.pathname.replace(/^\//, '').split('/')[0];
  return VALID.indexOf(path) >= 0 ? path : 'home';
}

// ── Spotify ──────────────────────────────────────────────────
function toggleSpotify() {
  spOpen = !spOpen;
  document.getElementById('spotify-bar').classList.toggle('open', spOpen);
  document.getElementById('spotify-toggle').classList.toggle('bar-open', spOpen);
}

// ── Mobile drawer ─────────────────────────────────────────────
function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }
function closeDrawer()  { document.getElementById('drawer').classList.remove('open'); }

// ── Handle redirect from 404.html (page refresh on deep link) ─
var _redirect = sessionStorage.getItem('redirect-page');
if (_redirect) { sessionStorage.removeItem('redirect-page'); }

// ── Init ─────────────────────────────────────────────────────
var initPage = _redirect || getInitialPage();
currentPage = initPage;
document.querySelectorAll('[data-page]').forEach(function(a) {
  a.classList.toggle('active', a.dataset.page === initPage);
});
history.replaceState({page:initPage}, '', '/' + initPage);
document.getElementById('content-frame').src = '/' + initPage;
</script>
</body>
</html>
